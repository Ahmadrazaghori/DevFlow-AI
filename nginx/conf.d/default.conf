upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Backend API ---
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # --- API docs (Swagger / ReDoc / OpenAPI schema) ---
    location /api/docs {
        proxy_pass http://backend_upstream/api/docs;
        proxy_set_header Host $host;
    }

    location /api/redoc {
        proxy_pass http://backend_upstream/api/redoc;
        proxy_set_header Host $host;
    }

    location /api/openapi.json {
        proxy_pass http://backend_upstream/api/openapi.json;
        proxy_set_header Host $host;
    }

    # --- Backend health check ---
    location /health {
        proxy_pass http://backend_upstream/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # --- Frontend SPA ---
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
