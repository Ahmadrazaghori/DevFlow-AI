name: devflow-ai

services:
  postgres:
    image: postgres:16-alpine
    container_name: devflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-devflow_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devflow} -d ${POSTGRES_DB:-devflow_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - devflow_network

  redis:
    image: redis:7-alpine
    container_name: devflow_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - devflow_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: devflow_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - backend_logs:/app/logs
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - devflow_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: devflow_celery_worker
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - ./backend/app:/app/app
    networks:
      - devflow_network

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: devflow_celery_beat
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - ./backend/app:/app/app
    networks:
      - devflow_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: devflow_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:80"
    networks:
      - devflow_network

  nginx:
    image: nginx:1.27-alpine
    container_name: devflow_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - devflow_network

networks:
  devflow_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_logs:
